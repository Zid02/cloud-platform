name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend deps
        run: |
          cd backend
          npm ci
      - name: Install frontend deps (none)
        run: echo "No frontend npm dependencies yet"
      - name: Run backend tests
        run: |
          cd backend
          npm test
      - name: Lint placeholder
        run: |
          echo "Lint step placeholder"
